<!DOCTYPE html>
<html lang="vi">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reveal Lazy Load</title>
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #111;
      color: #fff;
      padding: 2rem;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 1rem;
      max-width: 1100px;
      margin: 0 auto;
    }

    .img-wrap {
      display: block;
      position: relative;
      padding-bottom: 66.67%;
      overflow: hidden;
    }

    .img-wrap img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      clip-path: inset(100% 0 0 0);
      transition:
        clip-path 0.85s cubic-bezier(0.77, 0, 0.175, 1),
        transform 1.2s cubic-bezier(0.25, 1, 0.5, 1);
    }

    .img-wrap.revealed img {
      clip-path: inset(0% 0 0 0);
      transform: scale(1);
    }
  </style>
</head>

<body>

  <div class="grid">

    <picture class="img-wrap">
      <img class="lazy" data-src="https://picsum.photos/seed/11/800/533" alt="">
    </picture>

    <picture class="img-wrap">
      <img class="lazy" data-src="https://picsum.photos/seed/22/800/533" alt="">
    </picture>

    <picture class="img-wrap">
      <img class="lazy" data-src="https://picsum.photos/seed/33/800/533" alt="">
    </picture>

    <picture class="img-wrap">
      <img class="lazy" data-src="https://picsum.photos/seed/44/800/533" alt="">
    </picture>

    <picture class="img-wrap">
      <img class="lazy" data-src="https://picsum.photos/seed/55/800/533" alt="">
    </picture>

    <picture class="img-wrap">
      <img class="lazy" data-src="https://picsum.photos/seed/66/800/533" alt="">
    </picture>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/vanilla-lazyload@19/dist/lazyload.min.js"></script>
  <script>
    new LazyLoad({
      elements_selector: '.lazy',
      callback_loaded: (img) => {
        const wrap = img.closest('.img-wrap');
        if (!wrap) return;
        img.style.transform = 'scale(1.05)';
        const ready = img.decode ? img.decode() : Promise.resolve();
        ready.finally(() => {
          requestAnimationFrame(() => wrap.classList.add('revealed'));
        });
      },
    });
  </script>

</body>

</html>
